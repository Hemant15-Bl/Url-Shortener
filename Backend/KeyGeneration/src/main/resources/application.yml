spring:
  application:
    name: KEY-GENERATION

  datasource:
    url: jdbc:mysql://localhost:3306/kgs_DB
    username: root
    password: root

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 9097

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

internal:
  secret: my-super-secret-key